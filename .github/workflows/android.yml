name: Aetheris FOSS Base APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.11.1

      - name: Build debug APK
        run: gradle :app:assembleDebug --stacktrace

      - name: Prepare source backup
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          mkdir -p release-backup
          git archive --format=zip --output="release-backup/Aetheris-WebView-FOSS-Base-${SHORT_SHA}.zip" HEAD

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: Aetheris-fossbase-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Upload source backup
        uses: actions/upload-artifact@v4
        with:
          name: Aetheris-fossbase-source-backup
          path: |
            release-backup/*.zip
            docs/releases/AETHERIS_FOSS_BASE_TEST_NOTES.md
            NOTICE_AETHERIS.md
            LICENSE.md
